name: Build add-on image

# Builds the add-on container and pushes it to GHCR. Tag a release (e.g. `git tag v0.1.0`
# matching addon/config.yaml `version`) and push the tag, or run manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercased automatically; must equal config.yaml image (…/hasmartcharge-amd64).
          images: ghcr.io/${{ github.repository_owner }}/hasmartcharge-amd64
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
